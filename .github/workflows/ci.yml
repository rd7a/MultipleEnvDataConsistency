name: Test Suite

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:
    inputs:
      env:
        description: "Test suite to run: countries, weather, iss or all"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - countries
          - weather
          - iss
  schedule:
      - cron: "0 7 * * *"     

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install Allure CLI
        run: |
          curl -L https://github.com/allure-framework/allure2/releases/download/2.30.0/allure-2.30.0.tgz -o allure.tgz
          tar -xzf allure.tgz
          sudo mv allure-2.30.0 /usr/local/allure
          echo "/usr/local/allure/bin" >> $GITHUB_PATH

      # Pipeline fails automatically if exit code is non-zero (any test fails)
      - name: Run all tests
  
        if: ${{ github.event.inputs.env == 'all' || github.event.inputs.env != 'workflow_dispatch' }}
        run: pytest -v --tb=short

      - name: Run countries tests
        if: ${{ github.event.inputs.env == 'countries' }}
        run: pytest --env countries -v --tb=short

      - name: Run weather tests
        if: ${{ github.event.inputs.env == 'weather' }}
        run: pytest --env weather -v --tb=short

      - name: Run iss tests
        if: ${{ github.event.inputs.env == 'iss' }}
        run: pytest --env iss -v --tb=short  

      - name: Generate Allure report
        if: always()
        run: allure generate reports/allure-results -o reports/allure-report --clean

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure-report/

      - name: Upload HTML report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-report
          path: reports/report.html
